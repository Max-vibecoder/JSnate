<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSnake</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --grid-color: #1e293b;
      --snake-color: #10b981;
      --snake-glow: #34d399;
      --food-color: #f43f5e;
      --food-glow: #fb7185;
      --text-color: #f8fafc;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --accent: #38bdf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
      border-radius: 16px;
      padding: 4px;
      background: linear-gradient(45deg, #1e293b, #334155);
    }

    canvas {
      background-color: rgba(15, 23, 42, 0.95);
      border-radius: 12px;
      display: block;
      cursor: none;
      /* Hide cursor over game */
    }

    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      pointer-events: none;
      z-index: 10;
    }

    .score-box {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .score-label {
      color: #94a3b8;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      z-index: 20;
      transition: opacity 0.3s ease;
    }

    .menu-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(to right, var(--snake-color), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
    }

    .btn {
      background: linear-gradient(135deg, var(--snake-color), var(--snake-glow));
      color: #064e3b;
      border: none;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
      font-family: 'Outfit', sans-serif;
      margin-top: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .controls-hint {
      margin-top: 40px;
      color: #94a3b8;
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    .key {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-weight: 700;
      color: #e2e8f0;
    }

    .game-over-stats {
      text-align: center;
      margin-bottom: 20px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    
    .footer {
      padding: 2rem 0;
      text-align: center;
      font-size: .875rem;
      color: #fff;
    }
    .footer a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="game-container">
    <div class="ui-overlay">
      <div class="score-box">
        <span class="score-label">Score</span>
        <span id="score">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">Best</span>
        <span id="high-score">0</span>
      </div>
    </div>

    <div id="start-screen" class="menu-overlay">
      <h1>JSnake</h1>
      <p style="color: #94a3b8; font-size: 1.1rem;">El clásico, reinventado.</p>
      <button class="btn" onclick="startGame()">Jugar</button>
      <div class="controls-hint">
        <span>Usa <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span
            class="key">→</span> para moverte</span>
      </div>
    </div>

    <div id="game-over-screen" class="menu-overlay hidden">
      <h1
        style="font-size: 3rem; background: linear-gradient(to right, var(--food-color), var(--food-glow)); -webkit-background-clip: text; background-clip: text;">
        GAME OVER</h1>
      <div class="game-over-stats">
        <div class="stat-label">Puntuación Final</div>
        <div class="stat-value" id="final-score">0</div>
      </div>
      <button class="btn" onclick="startGame()">Reintentar</button>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');

    // Configuración
    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;
    const GAME_SPEED = 150; // ms

    // Estado del juego
    let snake = [];
    let food = {};
    let velocity = { x: 0, y: 0 };
    let nextVelocity = { x: 0, y: 0 }; // Buffer para evitar giros de 180 grados en un frame
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameInterval;
    let particles = [];
    let isGameRunning = false;

    // Inicialización
    highScoreEl.textContent = highScore;

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 6 - 3;
        this.speedY = Math.random() * 6 - 3;
        this.life = 1.0;
        this.decay = Math.random() * 0.05 + 0.02;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= this.decay;
        this.size *= 0.95;
      }

      draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function startGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      velocity = { x: 1, y: 0 };
      nextVelocity = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = score;
      isGameRunning = true;
      particles = [];

      placeFood();

      startScreen.classList.add('hidden');
      gameOverScreen.classList.add('hidden');

      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, GAME_SPEED);

      // Iniciar loop de animación para partículas y renderizado suave
      requestAnimationFrame(renderLoop);
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * TILE_COUNT),
        y: Math.floor(Math.random() * TILE_COUNT)
      };
      // Evitar que la comida aparezca sobre la serpiente
      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          placeFood();
          break;
        }
      }
    }

    function gameLoop() {
      if (!isGameRunning) return;

      // Actualizar velocidad desde el buffer
      velocity = { ...nextVelocity };

      const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

      // Colisiones con paredes
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        gameOver();
        return;
      }

      // Colisiones con uno mismo
      for (let part of snake) {
        if (head.x === part.x && head.y === part.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      // Comer comida
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }
        createExplosion(
          head.x * GRID_SIZE + GRID_SIZE / 2,
          head.y * GRID_SIZE + GRID_SIZE / 2,
          '#f43f5e'
        );
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      isGameRunning = false;
      clearInterval(gameInterval);
      finalScoreEl.textContent = score;
      gameOverScreen.classList.remove('hidden');
    }

    function renderLoop() {
      // Limpiar canvas
      ctx.fillStyle = '#0f172a'; // Color de fondo base para evitar estelas
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Dibujar Grid (sutil)
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID_SIZE, 0);
        ctx.lineTo(i * GRID_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * GRID_SIZE);
        ctx.lineTo(canvas.width, i * GRID_SIZE);
        ctx.stroke();
      }

      // Dibujar Comida
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#fb7185';
      ctx.fillStyle = '#f43f5e';
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      // Dibujar Serpiente
      snake.forEach((part, index) => {
        const isHead = index === 0;
        ctx.fillStyle = isHead ? '#34d399' : '#10b981';

        if (isHead) {
          ctx.shadowBlur = 20;
          ctx.shadowColor = '#34d399';
        } else {
          ctx.shadowBlur = 0;
        }

        // Dibujar cuerpo redondeado
        const x = part.x * GRID_SIZE;
        const y = part.y * GRID_SIZE;
        const size = GRID_SIZE - 2;
        const radius = isHead ? 6 : 4;

        ctx.beginPath();
        ctx.roundRect(x + 1, y + 1, size, size, radius);
        ctx.fill();

        // Ojos para la cabeza
        if (isHead) {
          ctx.fillStyle = '#064e3b';
          const eyeOffset = 4;
          const eyeSize = 3;

          // Determinar posición de ojos basado en velocidad
          let eyeX1, eyeY1, eyeX2, eyeY2;

          if (velocity.x === 1) { // Derecha
            eyeX1 = x + size - eyeOffset; eyeY1 = y + eyeOffset;
            eyeX2 = x + size - eyeOffset; eyeY2 = y + size - eyeOffset - eyeSize;
          } else if (velocity.x === -1) { // Izquierda
            eyeX1 = x + eyeOffset; eyeY1 = y + eyeOffset;
            eyeX2 = x + eyeOffset; eyeY2 = y + size - eyeOffset - eyeSize;
          } else if (velocity.y === -1) { // Arriba
            eyeX1 = x + eyeOffset; eyeY1 = y + eyeOffset;
            eyeX2 = x + size - eyeOffset - eyeSize; eyeY2 = y + eyeOffset;
          } else { // Abajo
            eyeX1 = x + eyeOffset; eyeY1 = y + size - eyeOffset;
            eyeX2 = x + size - eyeOffset - eyeSize; eyeY2 = y + size - eyeOffset;
          }

          ctx.fillRect(eyeX1, eyeY1, eyeSize, eyeSize);
          ctx.fillRect(eyeX2, eyeY2, eyeSize, eyeSize);
        }
      });
      ctx.shadowBlur = 0;

      // Dibujar Partículas
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }

      if (isGameRunning || particles.length > 0) {
        requestAnimationFrame(renderLoop);
      }
    }

    // Control de teclado
    document.addEventListener('keydown', (e) => {
      if (!isGameRunning) return;

      switch (e.key) {
        case 'ArrowUp':
          if (velocity.y === 0) nextVelocity = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
          if (velocity.y === 0) nextVelocity = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
          if (velocity.x === 0) nextVelocity = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
          if (velocity.x === 0) nextVelocity = { x: 1, y: 0 };
          break;
      }
    });

    // Render inicial
    renderLoop();

  </script>

</body>

</html>
